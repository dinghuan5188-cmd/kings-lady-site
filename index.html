<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KING'S LADY</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f2ed;
      color: #111;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }
    .hero {
      text-align: center;
      padding: 40px 20px;
    }
    .hero h1 {
      margin: 0;
      font-size: 40px;
    }
    .hero p {
      color: #666;
      margin-top: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .card img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }
    .card h3 {
      margin: 14px 0 8px;
      font-size: 20px;
    }
    .price {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .desc {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #111;
      color: white;
      text-decoration: none;
      font-size: 14px;
    }
    .section-title {
      font-size: 28px;
      margin: 30px 0 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>KING'S LADY</h1>
      <p>PLEATS COLLECTION</p>
      <p>플리츠의 아름다움</p>
    </div>

    <h2 class="section-title">플리츠 숄더백</h2>
    <div class="grid">
      <div class="card">
        <img src="O1CN01A9RXh82HwWs7b7dSg_!!2212425589215-0-cib.jpg" alt="그레이">
        <h3>플리츠 숄더백 (그레이)</h3>
        <div class="price">₩39,000</div>
        <div class="desc">가볍고 유연한 플리츠 소재 / 데일리 착용</div>
        <a class="btn" href="mailto:hharpyeagle@naver.com">구매 문의</a>
      </div>

      <div class="card">
        <img src="O1CN01laBvju2HwWs7HKtaH_!!2212425589215-0-cib.jpg" alt="오렌지">
        <h3>플리츠 숄더백 (오렌지)</h3>
        <div class="price">₩39,000</div>
        <div class="desc">포인트 컬러로 스타일 완성</div>
        <a class="btn" href="mailto:hharpyeagle@naver.com">구매 문의</a>
      </div>

      <div class="card">
        <img src="O1CN01npbKOV2HwWs8nPRYb_!!2212425589215-0-cib.jpg" alt="블루">
        <h3>플리츠 숄더백 (블루)</h3>
        <div class="price">₩39,000</div>
        <div class="desc">감각적인 컬러와 디자인</div>
        <a class="btn" href="mailto:hharpyeagle@naver.com">구매 문의</a>
      </div>

      <div class="card">
        <img src="O1CN01VHZ8352HwWs819iKt_!!2212425589215-0-cib.jpg" alt="블랙">
        <h3>플리츠 숄더백 (블랙)</h3>
        <div class="price">₩39,000</div>
        <div class="desc">데일리 필수 기본 컬러</div>
        <a class="btn" href="mailto:hharpyeagle@naver.com">구매 문의</a>
      </div>
    </div>
  </div>
</body>
</html>
